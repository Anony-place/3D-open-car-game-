<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Open World Racing</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="speed-lines"></div>

    <div id="overlay-ui">
        <div id="start-screen" class="screen">
            <h1>CITY DRIFT PRO</h1>
            <p style="color: #ff00ff; margin-bottom: 20px; letter-spacing: 2px;">REALISTIC OPEN WORLD</p>
            <div style="display: flex; gap: 20px; margin-bottom: 40px;">
                <button class="btn" id="start-btn">FREE ROAM</button>
                <button class="btn" id="race-btn" style="border-color: #ff00ff; color: #ff00ff;">RACE MODE</button>
            </div>
            <p style="color: rgba(255,255,255,0.4); font-size: 11px;">WASD TO DRIVE | SHIFT FOR NITRO | SPACE FOR HANDBRAKE</p>
        </div>

        <div id="countdown">3</div>

        <div id="win-screen" class="screen">
            <h1 style="color: #ff00ff;">RACE COMPLETE</h1>
            <p id="final-stats" style="color: #fff; margin-bottom: 40px;"></p>
            <button class="btn" onclick="location.reload()">RE-INITIALIZE</button>
        </div>
    </div>

    <div id="hud">
        <div class="hud-item" id="hud-score">CORES: 0 / 15</div>
        <div class="hud-item" id="hud-speed">0 <span id="speed-unit">KM/H</span></div>
        <div id="nitro-container">
            <div id="nitro-bar"></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div style="display: flex; gap: 20px;">
            <div class="ctrl-btn" id="btn-l">L</div>
            <div class="ctrl-btn" id="btn-r">R</div>
        </div>
        <div style="display: flex; gap: 20px;">
            <div class="ctrl-btn" style="border-color: #ff00ff; color: #ff00ff;" id="btn-n">NOS</div>
            <div class="ctrl-btn" id="btn-w">GO</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
            }
        }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
